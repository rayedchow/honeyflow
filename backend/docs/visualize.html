<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Attribution Graph</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0f; color: #ccc; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; overflow: hidden; }

  #controls {
    position: fixed; top: 0; left: 0; right: 0; z-index: 10;
    display: flex; align-items: center; gap: 10px;
    padding: 12px 20px; background: rgba(10,10,15,.92); backdrop-filter: blur(8px);
    border-bottom: 1px solid #1a1a2e;
  }
  #controls input {
    flex: 1; padding: 8px 14px; border-radius: 6px; border: 1px solid #2a2a3e;
    background: #12121c; color: #eee; font-size: 14px; outline: none;
  }
  #controls input:focus { border-color: #5b5bf0; }
  #controls button {
    padding: 8px 18px; border-radius: 6px; border: none; cursor: pointer;
    background: #5b5bf0; color: #fff; font-size: 14px; font-weight: 500;
    white-space: nowrap;
  }
  #controls button:disabled { opacity: .4; cursor: wait; }
  #controls select {
    padding: 8px 10px; border-radius: 6px; border: 1px solid #2a2a3e;
    background: #12121c; color: #eee; font-size: 13px;
  }

  #status {
    position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
    padding: 6px 16px; border-radius: 20px; background: rgba(20,20,30,.85);
    font-size: 12px; color: #888; z-index: 10; pointer-events: none;
  }

  canvas { display: block; }

  #tooltip {
    position: fixed; display: none; padding: 8px 12px; border-radius: 6px;
    background: rgba(20,20,35,.95); border: 1px solid #2a2a3e;
    font-size: 12px; color: #ddd; pointer-events: none; z-index: 20;
    max-width: 280px; line-height: 1.4;
  }

  #attribution {
    position: fixed; top: 56px; right: 0; bottom: 0; width: 280px;
    background: rgba(10,10,18,.92); backdrop-filter: blur(8px);
    border-left: 1px solid #1a1a2e; z-index: 10;
    display: none; flex-direction: column;
    font-size: 13px;
  }
  #attribution.visible { display: flex; }
  #attr-header {
    padding: 14px 16px 10px; font-weight: 600; color: #eee;
    border-bottom: 1px solid #1a1a2e; flex-shrink: 0;
  }
  #attr-list {
    flex: 1; overflow-y: auto; padding: 6px 0;
  }
  .attr-row {
    display: flex; align-items: center; padding: 6px 16px; gap: 10px;
  }
  .attr-row:hover { background: rgba(91,91,240,.08); }
  .attr-rank { color: #555; font-size: 11px; width: 22px; text-align: right; flex-shrink: 0; }
  .attr-bar-bg {
    flex: 1; height: 6px; border-radius: 3px; background: #1a1a2e; position: relative;
    overflow: hidden;
  }
  .attr-bar {
    position: absolute; left: 0; top: 0; bottom: 0; border-radius: 3px;
    background: linear-gradient(90deg, #5b5bf0, #e8913a);
  }
  .attr-name { flex: 1; color: #ccc; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .attr-pct { color: #888; font-size: 11px; width: 48px; text-align: right; flex-shrink: 0; }
  #attr-total {
    padding: 10px 16px; border-top: 1px solid #1a1a2e; flex-shrink: 0;
    font-size: 11px; color: #666;
  }
</style>
</head>
<body>

<div id="controls">
  <select id="mode">
    <option value="repo">Git Repo</option>
    <option value="paper">Paper</option>
  </select>
  <input id="url" type="text" placeholder="https://github.com/owner/repo" value="https://github.com/pallets/flask">
  <select id="depth"><option value="1">Depth 1</option><option value="2">Depth 2</option><option value="3" selected>Depth 3</option></select>
  <select id="children"><option value="3">3</option><option value="5" selected>5</option><option value="8">8</option><option value="10">10</option></select>
  <button id="go">Trace</button>
</div>

<div id="status">Enter a GitHub repo URL or arXiv ID and click Trace</div>
<div id="tooltip"></div>
<canvas id="c"></canvas>

<div id="attribution">
  <div id="attr-header">User Attribution</div>
  <div id="attr-list"></div>
  <div id="attr-total"></div>
</div>

<script>
const API = "http://localhost:8000";
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
const tooltip = document.getElementById("tooltip");
const status = document.getElementById("status");

let W, H, dpr;
let nodes = [], edges = [], nodeMap = {};
let childrenOf = {};
let sim = null;
let drag = null;
let hover = null;
let camX = 0, camY = 0, camZ = 1;
let panStart = null;

const COLORS = {
  REPO: "#7c6bf0", BODY_OF_WORK: "#2ecc71", CONTRIBUTOR: "#e8913a",
  PAPER: "#7c6bf0", CITED_WORK: "#2ecc71", AUTHOR: "#e8913a",
};
const RADIUS = {
  REPO: 26, BODY_OF_WORK: 14, CONTRIBUTOR: 9,
  PAPER: 26, CITED_WORK: 14, AUTHOR: 9,
};

const modeEl = document.getElementById("mode");
const urlEl = document.getElementById("url");

const MODE_DEFAULTS = {
  repo: { placeholder: "https://github.com/owner/repo", value: "https://github.com/pallets/flask" },
  paper: { placeholder: "arXiv ID, e.g. 2310.06825", value: "2310.06825" },
};

modeEl.addEventListener("change", () => {
  const m = MODE_DEFAULTS[modeEl.value];
  urlEl.placeholder = m.placeholder;
  urlEl.value = m.value;
});

function resize() {
  dpr = window.devicePixelRatio || 1;
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W * dpr; canvas.height = H * dpr;
  canvas.style.width = W + "px"; canvas.style.height = H + "px";
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener("resize", resize);
resize();

// ── Initial layout: place nodes radially by tree structure ──

function radialLayout() {
  const root = nodes.find(n => n.type === "REPO" || n.type === "PAPER");
  if (!root) return;
  root.x = 0; root.y = 0;

  const placed = new Set([root.id]);
  const queue = [root.id];
  let ring = 0;

  while (queue.length > 0) {
    ring++;
    const ringDist = ring * 200;
    const batch = [...queue];
    queue.length = 0;

    let allChildren = [];
    batch.forEach(pid => {
      (childrenOf[pid] || []).forEach(cid => {
        if (!placed.has(cid)) allChildren.push({ pid, cid });
      });
    });

    const count = allChildren.length;
    if (count === 0) continue;

    allChildren.forEach(({ pid, cid }, i) => {
      const parent = nodeMap[pid];
      const angle = (2 * Math.PI * i / count) - Math.PI / 2;
      const jitter = (Math.random() - 0.5) * 30;
      const n = nodeMap[cid];
      if (!n) return;
      n.x = parent.x + Math.cos(angle) * (ringDist + jitter);
      n.y = parent.y + Math.sin(angle) * (ringDist + jitter);
      placed.add(cid);
      queue.push(cid);
    });
  }

  nodes.forEach(n => {
    if (!placed.has(n.id)) {
      n.x = (Math.random() - 0.5) * 600;
      n.y = (Math.random() - 0.5) * 600;
    }
  });
}

// ── Force simulation ──

function initSim() {
  nodes.forEach(n => { n.vx = 0; n.vy = 0; n.fx = 0; n.fy = 0; });
  radialLayout();
  camX = 0; camY = 0;
  camZ = Math.min(1, Math.min(W, H) / (nodes.length * 25 + 400));
  sim = { alpha: 1, running: true, ticks: 0 };
}

function tick() {
  if (!sim || !sim.running) return;
  const alpha = sim.alpha;
  sim.ticks++;
  if (alpha < 0.002) { sim.running = false; return; }
  sim.alpha *= 0.995;

  const N = nodes.length;
  const chargeStr = -2000;
  const collisionPad = 8;

  // repulsion: Barnes-Hut would be better but O(n²) is fine for <200 nodes
  for (let i = 0; i < N; i++) {
    const a = nodes[i];
    for (let j = i + 1; j < N; j++) {
      const b = nodes[j];
      let dx = b.x - a.x, dy = b.y - a.y;
      let d2 = dx * dx + dy * dy;
      if (d2 < 4) { dx = Math.random() - 0.5; dy = Math.random() - 0.5; d2 = 1; }
      const d = Math.sqrt(d2);
      const f = chargeStr * alpha / d2;
      const ux = dx / d, uy = dy / d;
      a.fx -= ux * f;  a.fy -= uy * f;
      b.fx += ux * f;  b.fy += uy * f;

      // hard collision
      const minDist = (RADIUS[a.type] || 12) + (RADIUS[b.type] || 12) + collisionPad;
      if (d < minDist) {
        const push = (minDist - d) * 0.5;
        a.fx -= ux * push;  a.fy -= uy * push;
        b.fx += ux * push;  b.fy += uy * push;
      }
    }
  }

  // link springs -- distance varies by relationship
  edges.forEach(e => {
    const s = nodeMap[e.source], t = nodeMap[e.target];
    if (!s || !t) return;
    let targetDist = 180;
    if (t.type === "CONTRIBUTOR" || t.type === "AUTHOR") targetDist = 120;
    if (s.type === "REPO" || s.type === "PAPER") targetDist = 260;

    let dx = t.x - s.x, dy = t.y - s.y;
    let d = Math.sqrt(dx * dx + dy * dy) || 1;
    const f = (d - targetDist) * 0.06 * alpha;
    const ux = dx / d, uy = dy / d;
    s.fx += ux * f;  s.fy += uy * f;
    t.fx -= ux * f;  t.fy -= uy * f;
  });

  const root = nodes.find(n => n.type === "REPO" || n.type === "PAPER");
  if (root) {
    root.fx -= root.x * 0.05 * alpha;
    root.fy -= root.y * 0.05 * alpha;
  }

  // integrate
  const damping = 0.55;
  nodes.forEach(n => {
    if (n === drag) { n.fx = 0; n.fy = 0; return; }
    n.vx = (n.vx + n.fx) * damping;
    n.vy = (n.vy + n.fy) * damping;
    n.x += n.vx;
    n.y += n.vy;
    n.fx = 0; n.fy = 0;
  });
}

// ── Drawing ──

function screenX(x) { return (x - camX) * camZ + W / 2; }
function screenY(y) { return (y - camY) * camZ + H / 2; }
function worldX(sx) { return (sx - W / 2) / camZ + camX; }
function worldY(sy) { return (sy - H / 2) / camZ + camY; }

function draw() {
  ctx.clearRect(0, 0, W, H);

  // edges
  edges.forEach(e => {
    const s = nodeMap[e.source], t = nodeMap[e.target];
    if (!s || !t) return;
    const sx = screenX(s.x), sy = screenY(s.y);
    const tx = screenX(t.x), ty = screenY(t.y);

    ctx.beginPath();
    ctx.moveTo(sx, sy);
    ctx.lineTo(tx, ty);
    ctx.lineWidth = Math.max(0.4, e.weight * 5) * camZ;
    ctx.strokeStyle = "rgba(255,255,255," + (0.05 + e.weight * 0.2) + ")";
    ctx.stroke();

    if (camZ > 0.45 && e.weight > 0.02) {
      const mx = sx * 0.55 + tx * 0.45, my = sy * 0.55 + ty * 0.45;
      ctx.fillStyle = "rgba(255,255,255,0.22)";
      ctx.font = Math.max(8, 9 * camZ) + "px sans-serif";
      ctx.textAlign = "center";
      ctx.fillText(e.label, mx, my - 3 * camZ);
    }
  });

  // nodes (draw contributors first, then BOW, then REPO on top)
  const order = ["CONTRIBUTOR", "AUTHOR", "BODY_OF_WORK", "CITED_WORK", "REPO", "PAPER"];
  const sorted = [...nodes].sort((a, b) => order.indexOf(a.type) - order.indexOf(b.type));

  sorted.forEach(n => {
    const x = screenX(n.x), y = screenY(n.y);
    const r = RADIUS[n.type] * camZ;
    const col = COLORS[n.type];
    const isHover = hover === n;

    // glow
    if (r > 3) {
      const grd = ctx.createRadialGradient(x, y, r * 0.3, x, y, r * 3);
      grd.addColorStop(0, col + (isHover ? "50" : "25"));
      grd.addColorStop(1, col + "00");
      ctx.beginPath();
      ctx.arc(x, y, r * 3, 0, Math.PI * 2);
      ctx.fillStyle = grd;
      ctx.fill();
    }

    // circle
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fillStyle = isHover ? col : col + "bb";
    ctx.fill();
    if (isHover) { ctx.lineWidth = 2; ctx.strokeStyle = "#fff"; ctx.stroke(); }

    // label
    const isRoot = n.type === "REPO" || n.type === "PAPER";
    const isMid = n.type === "BODY_OF_WORK" || n.type === "CITED_WORK";
    const minZoom = isRoot ? 0 : isMid ? 0.35 : 0.55;
    if (camZ > minZoom) {
      ctx.fillStyle = isHover ? "#fff" : "#ccc";
      const fs = isRoot ? 13 : isMid ? 10.5 : 9;
      ctx.font = Math.max(7, fs * Math.min(camZ, 1.6)) + "px sans-serif";
      ctx.textAlign = "center";
      let label = n.label;
      if (label.includes("/") && !isRoot) label = label.split("/").pop();
      if (label.length > 22) label = label.slice(0, 21) + "…";
      ctx.fillText(label, x, y + r + 11 * Math.min(camZ, 1.2));
    }
  });
}

function loop() {
  const steps = (sim && sim.alpha > 0.3) ? 4 : 2;
  for (let i = 0; i < steps; i++) tick();
  draw();
  requestAnimationFrame(loop);
}

// ── Interaction ──

function nodeAt(mx, my) {
  const wx = worldX(mx), wy = worldY(my);
  for (let i = nodes.length - 1; i >= 0; i--) {
    const n = nodes[i];
    const r = RADIUS[n.type] + 6;
    if ((n.x - wx) ** 2 + (n.y - wy) ** 2 < r * r) return n;
  }
  return null;
}

canvas.addEventListener("mousedown", e => {
  const n = nodeAt(e.clientX, e.clientY);
  if (n) {
    drag = n;
    if (sim) { sim.running = true; sim.alpha = Math.max(sim.alpha, 0.3); }
  } else {
    panStart = { x: e.clientX, y: e.clientY, cx: camX, cy: camY };
  }
});

canvas.addEventListener("mousemove", e => {
  if (drag) {
    drag.x = worldX(e.clientX);
    drag.y = worldY(e.clientY);
    drag.vx = 0; drag.vy = 0;
    if (sim) { sim.running = true; sim.alpha = Math.max(sim.alpha, 0.08); }
  } else if (panStart) {
    camX = panStart.cx - (e.clientX - panStart.x) / camZ;
    camY = panStart.cy - (e.clientY - panStart.y) / camZ;
  } else {
    const n = nodeAt(e.clientX, e.clientY);
    hover = n;
    canvas.style.cursor = n ? "grab" : "default";
    if (n) {
      let html = "<strong style='color:" + COLORS[n.type] + "'>" + n.label + "</strong>";
      html += "<br><span style='opacity:.6'>" + n.type.replace(/_/g, " ") + "</span>";
      if (n.metadata && n.metadata.purpose) html += "<br>" + n.metadata.purpose;
      if (n.metadata && n.metadata.tech_stack && n.metadata.tech_stack.length)
        html += "<br><span style='opacity:.5'>" + n.metadata.tech_stack.join(", ") + "</span>";
      tooltip.innerHTML = html;
      tooltip.style.display = "block";
      tooltip.style.left = Math.min(e.clientX + 14, W - 290) + "px";
      tooltip.style.top = (e.clientY + 14) + "px";
    } else {
      tooltip.style.display = "none";
    }
  }
});

canvas.addEventListener("mouseup", () => { drag = null; panStart = null; });
canvas.addEventListener("wheel", e => {
  e.preventDefault();
  const factor = e.deltaY > 0 ? 0.88 : 1.12;
  const newZ = Math.max(0.08, Math.min(5, camZ * factor));
  const wx = worldX(e.clientX), wy = worldY(e.clientY);
  camZ = newZ;
  camX = wx - (e.clientX - W / 2) / camZ;
  camY = wy - (e.clientY - H / 2) / camZ;
}, { passive: false });

// ── API ──

document.getElementById("go").addEventListener("click", async () => {
  const input = urlEl.value.trim();
  if (!input) return;
  const btn = document.getElementById("go");
  const mode = modeEl.value;
  btn.disabled = true;
  status.textContent = mode === "paper" ? "Tracing citations…" : "Tracing contributions…";

  try {
    const depth = document.getElementById("depth").value;
    const children = document.getElementById("children").value;

    let endpoint, body;
    if (mode === "paper") {
      endpoint = "/trace_citation_graph";
      body = { arxiv_id: input, max_depth: +depth, max_citations: +children };
    } else {
      endpoint = "/trace_graph";
      body = { repo_url: input, max_depth: +depth, max_children: +children };
    }

    const resp = await fetch(API + endpoint, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body),
    });
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      throw new Error(err.detail || "API " + resp.status);
    }
    const data = await resp.json();
    const attr = data.user_attribution || data.author_attribution || {};
    loadGraph(data, attr);
    status.textContent = data.graph.nodes.length + " nodes · " + data.graph.edges.length + " edges";
  } catch (err) {
    status.textContent = "Error: " + err.message;
  } finally {
    btn.disabled = false;
  }
});

function loadGraph(data, attr) {
  nodes = data.graph.nodes.map(n => ({ ...n, x: 0, y: 0, vx: 0, vy: 0, fx: 0, fy: 0 }));
  edges = data.graph.edges;
  nodeMap = {};
  childrenOf = {};
  nodes.forEach(n => nodeMap[n.id] = n);
  edges.forEach(e => {
    if (!childrenOf[e.source]) childrenOf[e.source] = [];
    childrenOf[e.source].push(e.target);
  });
  const isPaper = nodes.some(n => n.type === "PAPER");
  renderAttribution(attr || {}, isPaper);
  initSim();
}

function renderAttribution(attr, isPaper) {
  const panel = document.getElementById("attribution");
  const list = document.getElementById("attr-list");
  const total = document.getElementById("attr-total");
  const header = document.getElementById("attr-header");
  const entries = Object.entries(attr);

  header.textContent = isPaper ? "Author Attribution" : "User Attribution";
  if (entries.length === 0) { panel.classList.remove("visible"); return; }
  panel.classList.add("visible");

  const maxPct = entries.length > 0 ? entries[0][1] : 1;
  let html = "";
  entries.forEach(([user, credit], i) => {
    const pct = (credit * 100).toFixed(2);
    const barW = ((credit / maxPct) * 100).toFixed(1);
    html += '<div class="attr-row">'
      + '<span class="attr-rank">' + (i + 1) + '</span>'
      + '<span class="attr-name">' + user + '</span>'
      + '<span class="attr-pct">' + pct + '%</span>'
      + '</div>'
      + '<div class="attr-row" style="padding-top:0;padding-bottom:8px">'
      + '<span class="attr-rank"></span>'
      + '<div class="attr-bar-bg"><div class="attr-bar" style="width:' + barW + '%"></div></div>'
      + '<span class="attr-pct"></span>'
      + '</div>';
  });
  list.innerHTML = html;

  const sum = entries.reduce((s, e) => s + e[1], 0);
  const noun = isPaper ? "authors" : "users";
  total.textContent = entries.length + " " + noun + " · " + (sum * 100).toFixed(1) + "% traced";
}

requestAnimationFrame(loop);
</script>
</body>
</html>
